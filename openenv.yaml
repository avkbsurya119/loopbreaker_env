name: loopbreaker
version: "1.0.0"
description: >
  LoopBreaker is a real-world OpenEnv environment where an AI agent must detect
  and intervene in human decision-making loops — repetitive searches, content revisits,
  and indecisive app-switching. Agents learn to recognize loop patterns and choose
  the optimal intervention strategy.
tags:
  - openenv
  - psychology
  - decision-making
  - real-world
tasks:
  - name: easy
    description: "Detect a simple repeated-search loop. Correct intervention: decide."
    difficulty: easy
    max_steps: 5
  - name: medium
    description: "Detect mixed app-switch or content-revisit loop. Choose pause or reframe."
    difficulty: medium
    max_steps: 8
  - name: hard
    description: "Detect compound multi-modal loop. Identify all types, best intervention, confidence>=0.8."
    difficulty: hard
    max_steps: 12
action_space:
  type: object
  properties:
    intervention:
      type: string
      enum: [decide, pause, reframe, monitor, escalate]
    reason:
      type: string
    confidence:
      type: number
      minimum: 0.0
      maximum: 1.0
observation_space:
  type: object
  properties:
    current_behavior_sequence:
      type: array
      items:
        type: string
    loop_detected:
      type: boolean
    loop_type:
      type: string
      nullable: true
    loop_depth:
      type: integer
    suggested_action:
      type: string
      nullable: true
    step_number:
      type: integer
    task_description:
      type: string
    time_elapsed:
      type: integer
reward_range: [0.0, 1.0]
baseline_scores:
  easy: 0.75
  medium: 0.55
  hard: 0.30
